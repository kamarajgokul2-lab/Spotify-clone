<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GK Music — Stream Your World</title>
  <meta name="description" content="GK Music — Premium music streaming with Tamil & English hits.">
  <meta name="theme-color" content="#0a0a0f">
  <link rel="stylesheet" href="css/style.css">
  <!-- Favicon inline SVG -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0a0f'/><text y='.9em' font-size='80' x='10'>🎵</text></svg>">
</head>
<body>

<!-- ===================== APP ===================== -->
<div id="app">

  <!-- ─── Sidebar ─── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎵</div>
      <div class="logo-text">GK<span> Music</span></div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-section-title">Menu</div>
        <div class="nav-item active" data-page="home">
          <span class="nav-icon">🏠</span><span>Home</span>
        </div>
        <div class="nav-item" data-page="search">
          <span class="nav-icon">🔍</span><span>Browse</span>
        </div>
        <div class="nav-item" data-page="library">
          <span class="nav-icon">🎵</span><span>All Songs</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Your Library</div>
        <div class="nav-item" data-page="liked">
          <span class="nav-icon">❤️</span><span>Liked Songs</span>
        </div>
        <div class="nav-item" data-page="recent">
          <span class="nav-icon">🕒</span><span>Recently Played</span>
        </div>
        <div class="nav-item" data-page="playlists">
          <span class="nav-icon">📂</span><span>Playlists</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Admin</div>
        <div class="nav-item" data-page="admin">
          <span class="nav-icon">🎛</span><span>Dashboard</span>
        </div>
      </div>
    </nav>

    <div class="sidebar-playlists" id="sidebarPlaylists">
      <!-- Populated by JS -->
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ─── Main Content ─── -->
  <div class="main-content">

    <!-- Top Bar -->
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">☰</button>
      <div class="topbar-nav-btns">
        <div class="nav-btn" onclick="history.back()">‹</div>
        <div class="nav-btn" onclick="history.forward()">›</div>
      </div>

      <!-- Search -->
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input class="search-bar" id="mainSearch" type="search"
               placeholder="Search songs, artists, genres…" autocomplete="off" spellcheck="false">
        <button class="search-clear" id="searchClear" aria-label="Clear search">✕</button>
        <div class="search-dropdown" id="searchDropdown">
          <!-- Populated by JS -->
        </div>
      </div>

      <div class="topbar-actions">
        <button class="topbar-btn outline" onclick="App.navigateTo('playlists')">📂 Playlists</button>
        <button class="topbar-btn accent" onclick="App.navigateTo('admin')">⚙️ Admin</button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">

      <!-- HOME -->
      <div class="page active" id="page-home">
        <div style="padding:40px;text-align:center;color:var(--text-muted)">
          <div style="font-size:40px;margin-bottom:12px">🎵</div>
          Loading GK Music…
        </div>
      </div>

      <!-- SEARCH / BROWSE -->
      <div class="page" id="page-search"></div>

      <!-- LIBRARY -->
      <div class="page" id="page-library"></div>

      <!-- LIKED -->
      <div class="page" id="page-liked"></div>

      <!-- RECENT -->
      <div class="page" id="page-recent"></div>

      <!-- PLAYLISTS -->
      <div class="page" id="page-playlists"></div>

      <!-- ADMIN -->
      <div class="page" id="page-admin"></div>

    </main>
  </div><!-- /main-content -->
</div><!-- /app -->

<!-- ===================== MUSIC PLAYER ===================== -->
<div class="player" id="player">

  <!-- Left: Song Info -->
  <div class="player-info">
    <div class="player-cover-wrap" id="playerCover">
      <img class="player-cover-img" id="playerCoverImg" src="assets/covers/default1.svg" alt="Album Art">
    </div>
    <div class="player-song-info">
      <div class="title player-title">Nothing playing</div>
      <div class="artist player-artist">Select a song to begin</div>
    </div>
    <button class="player-like-btn" id="playerLikeBtn" title="Like">🤍</button>
  </div>

  <!-- Center: Controls -->
  <div class="player-controls">
    <div class="player-buttons">
      <button class="ctrl-btn" id="shuffleBtn" title="Shuffle (S)">🔀</button>
      <button class="ctrl-btn" id="prevBtn" title="Previous (←)">⏮</button>
      <button class="play-btn" id="playBtn" title="Play/Pause (Space)">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Next (→)">⏭</button>
      <button class="ctrl-btn" id="repeatBtn" title="Repeat (R)">🔁</button>
    </div>
    <div class="player-progress">
      <span class="time-label time-current">0:00</span>
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time-label time-total">0:00</span>
    </div>
  </div>

  <!-- Right: Volume -->
  <div class="player-right">
    <div class="volume-wrap">
      <button class="volume-btn" id="volumeBtn" title="Mute">🔊</button>
      <input class="volume-slider" id="volumeSlider" type="range" min="0" max="100" value="70">
    </div>
    <button class="fullscreen-btn" id="fullscreenBtn" title="Fullscreen (F)">⤢</button>
  </div>
</div>

<!-- ===================== FULLSCREEN PLAYER ===================== -->
<div class="fullscreen-player" id="fullscreenPlayer">
  <button class="fullscreen-close" id="fsClose">✕</button>

  <div class="fullscreen-art" id="fsArt">
    <img id="fsArtImg" src="assets/covers/default1.svg" alt="Album Art">
    <div class="art-rings"></div>
    <div class="art-rings"></div>
    <div class="art-rings"></div>
  </div>

  <div class="fullscreen-info">
    <div class="fullscreen-title" id="fsTitle">Nothing Playing</div>
    <div class="fullscreen-artist" id="fsArtist">Select a song to begin</div>
  </div>

  <div class="fullscreen-controls">
    <div class="fullscreen-buttons">
      <button class="fs-ctrl-btn" id="fsShuffleBtn" title="Shuffle">🔀</button>
      <button class="fs-ctrl-btn" id="fsPrevBtn" title="Previous">⏮</button>
      <button class="fs-play-btn" id="fsPlayBtn" title="Play/Pause">▶</button>
      <button class="fs-ctrl-btn" id="fsNextBtn" title="Next">⏭</button>
      <button class="fs-ctrl-btn" id="fsRepeatBtn" title="Repeat">🔁</button>
    </div>

    <div class="fullscreen-progress player-progress">
      <span class="time-label time-current">0:00</span>
      <div class="progress-track" id="fsProgressTrack">
        <div class="progress-fill"></div>
      </div>
      <span class="time-label time-total">0:00</span>
    </div>

    <div class="fullscreen-volume">
      <span style="font-size:18px">🔊</span>
      <input class="volume-slider" id="fsVolumeSlider" type="range" min="0" max="100" value="70"
             style="width:140px">
    </div>
  </div>
</div>

<!-- ===================== TOAST CONTAINER ===================== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ===================== SCRIPTS ===================== -->
<script src="js/db.js"></script>
<script src="js/search.js"></script>
<script src="js/ui.js"></script>
<script src="js/player.js"></script>
<script src="js/app.js"></script>

</body>
</html>
